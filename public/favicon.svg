<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0A0412"/>
  <!-- Wand body -->
  <line x1="22" y1="9" x2="8" y2="23" stroke="#A89BC2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wand tip glow -->
  <circle cx="22" cy="9" r="3.5" fill="#F5E642"/>
  <circle cx="22" cy="9" r="5" fill="#F5E642" opacity="0.25"/>
  <!-- Rays -->
  <line x1="22" y1="3"  x2="22" y2="6"  stroke="#F5E642" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="9"  x2="26" y2="9"  stroke="#F5E642" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="5"  x2="25" y2="7"  stroke="#F5E642" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="5"  x2="19" y2="7"  stroke="#F5E642" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="27" y1="13" x2="25" y2="11" stroke="#F5E642" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Small sparkles -->
  <circle cx="14" cy="18" r="1"   fill="#F5E642" opacity="0.4"/>
  <circle cx="10" cy="14" r="0.7" fill="#F5E642" opacity="0.3"/>
</svg>
